<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyệt Minh ❤️ Văn Bảo</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f9f295;
            --pink-main: #ff758c;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Quicksand', sans-serif;
            background: #fff0f3;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden;
        }

        .wrapper { width: 90%; max-width: 450px; text-align: center; padding: 20px; }

        /* KHUNG TÊN */
        .name-frame {
            position: relative; padding: 8px;
            background: linear-gradient(145deg, var(--gold), var(--gold-light), var(--gold));
            border-radius: 15px; box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4);
            margin-bottom: 25px; display: inline-block; width: 100%;
        }
        .name-box { background: white; border-radius: 10px; padding: 15px 5px; position: relative; overflow: hidden; }
        h2 {
            font-family: 'Dancing Script', cursive; font-size: 2.5rem; margin: 0;
            background: linear-gradient(to right, #b33939, var(--pink-main), #b33939);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* PHONG THƯ BÍ MẬT */
        .letter-container { margin-bottom: 25px; cursor: pointer; }
        .envelope {
            background: #fff; width: 180px; height: 110px; margin: 0 auto;
            border-radius: 10px; border: 2px solid var(--gold);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .envelope:hover { transform: translateY(-5px); }

        /* MODAL */
        .modal {
            display: none; position: fixed; z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px;
            width: 85%; max-width: 380px; text-align: center;
        }
        input {
            width: 120px; padding: 10px; font-size: 1.2rem; text-align: center;
            border: 2px solid var(--pink-main); border-radius: 10px; outline: none; margin: 15px 0;
        }
        .btn-open {
            padding: 10px 25px; background: var(--pink-main);
            color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
        }

        /* NỘI DUNG THƯ */
        #secret-message {
            display: none; font-family: 'Dancing Script', cursive;
            font-size: 1.6rem; color: #b33939; line-height: 1.6;
        }
        .love-you {
            display: block; margin-top: 15px; font-size: 2rem; color: var(--pink-main);
            text-shadow: 0 0 5px rgba(255,117,140,0.3);
        }

        /* CÁC PHẦN CÒN LẠI */
        .content-body {
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
            border-radius: 25px; padding: 25px; border: 1px solid white;
        }
        .couple-img {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            object-fit: cover; margin-bottom: 15px;
        }
        .timer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .time-item { background: white; padding: 12px 5px; border-radius: 15px; }
        .time-val { display: block; font-size: 1.4rem; font-weight: 700; color: var(--pink-main); }
        .time-label { font-size: 0.6rem; color: #999; text-transform: uppercase; }

        .petal { position: fixed; top: -10%; color: var(--pink-main); opacity: 0.4; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="name-frame">
            <div class="name-box"><h2>Nguyệt Minh & Văn Bảo</h2></div>
        </div>

        <div class="letter-container" onclick="openUnlockModal()">
            <div class="envelope">
                <div style="font-size: 2rem;">🔒</div>
                <div style="color: var(--gold); font-weight: bold; font-size: 0.8rem;">THƯ BÍ MẬT</div>
            </div>
        </div>

        <div class="content-body">
            <img src="capdoi.jpg" alt="Couple" class="couple-img">
            <div class="timer">
                <div class="time-item"><span id="days" class="time-val">00</span><span class="time-label">Ngày</span></div>
                <div class="time-item"><span id="hours" class="time-val">00</span><span class="time-label">Giờ</span></div>
                <div class="time-item"><span id="minutes" class="time-val">00</span><span class="time-label">Phút</span></div>
                <div class="time-item"><span id="seconds" class="time-val">00</span><span class="time-label">Giây</span></div>
            </div>
            <p style="margin-top: 20px; font-weight: bold; color: var(--gold);">03 . 02 . 2026</p>
        </div>
    </div>

    <div id="lockModal" class="modal">
        <div class="modal-content">
            <div id="pass-area">
                <h3 style="color: var(--pink-main); margin: 0;">Nhập mật mã tình yêu</h3>
                <p style="font-size: 0.8rem; color: #888;">Gợi ý: Ngày kỷ niệm của chúng mình (ddmm)</p>
                <input type="password" id="passInput" maxlength="4" placeholder="****">
                <br>
                <button class="btn-open" onclick="checkPass()">XÁC NHẬN</button>
            </div>
            <div id="secret-message">
                 Thư mật
                <span class="love-you">Chúc anh sớm kiếm nhiều tiền để nuôi em 🥰</span> 
                <br>
                <button class="btn-open" onclick="closeModal()" style="background: #ccc; font-size: 0.8rem; margin-top: 20px;">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        /* Cập nhật ngày bắt đầu: 03/02/2026 
           Trong JS, tháng bắt đầu từ 0 (Tháng 2 là số 1)
        */
        const startDate = new Date(2026, 1, 3, 0, 0, 0).getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - startDate;

            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / 86400000);
                document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000);
                document.getElementById('minutes').innerText = Math.floor((diff % 3600000) / 60000);
                document.getElementById('seconds').innerText = Math.floor((diff % 60000) / 1000);
            } else {
                // Nếu chưa đến ngày 03/02/2026 thì hiện 00
                document.getElementById('days').innerText = "00";
                document.getElementById('hours').innerText = "00";
                document.getElementById('minutes').innerText = "00";
                document.getElementById('seconds').innerText = "00";
            }
        }, 1000);

        function openUnlockModal() {
            document.getElementById('lockModal').style.display = 'flex';
            document.getElementById('pass-area').style.display = 'block';
            document.getElementById('secret-message').style.display = 'none';
        }

        function checkPass() {
            const pass = document.getElementById('passInput').value;
            // Đổi mật mã thành 0302 cho khớp với ngày mới
            if (pass === '0302') {
                document.getElementById('pass-area').style.display = 'none';
                document.getElementById('secret-message').style.display = 'block';
                for(let i=0; i<30; i++) setTimeout(createPetal, i*50);
            } else {
                alert('Mật mã chưa đúng rồi! Thử lại nha ❤️');
            }
        }

        function closeModal() { document.getElementById('lockModal').style.display = 'none'; }

        function createPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.innerHTML = ['🌸', '💖', '✨', '❤️'][Math.floor(Math.random()*4)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = Math.random() * 20 + 15 + 'px';
            p.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }
        setInterval(createPetal, 600);
    </script>
</body>
</html>
